version: '3'
services:
    rabbitmq:
        image: smebberson/alpine-rabbitmq
        networks:
            - wd-ingress
        ports:
            - "55672:15672"
            - "5672:5672"
        volumes:
            - rabbitmq-log:/data/rabbitmq/log
            - rabbitmq-data:/data/rabbitmq/mnesia
        deploy:
            mode: replicated
            replicas: 2
            restart_policy:
                condition: on-failure
#            placement:
#                constraints: [node.role == manager]
            resources:
                limits:
                    cpus: "1"
        environment:
            RABBITMQ_ENABLE_MANAGEMENT_PLUGIN: 'true'
            RABBITMQ_USER: tao
            RABBITMQ_PASS: p@55w0rd5
    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:5.6.11
        networks:
            - wd-ingress
        environment:
            ES_JAVA_OPTS: '-Xms512m -Xmx512m'
            cluster.name: "docker-cluster"
            search.remote.connect: 'false'
            xpack.security.enabled: 'false'
            discovery.zen.minimum_master_nodes: 1
            discovery.type: 'single-node'
        volumes:
            - elasticsearch5-data:/usr/share/elasticsearch/data
        deploy:
            mode: replicated
            replicas: 1
#            placement:
#                constraints: [node.role == manager]
            restart_policy:
                condition: on-failure
            resources:
                limits:
                    cpus: "1"
        ports:
            - '9200:9200'
    kibana:
        image: docker.elastic.co/kibana/kibana:5.6.11
        networks:
            - wd-ingress
        environment:
            kibana.index: ".kibana6"
            elasticsearch.url: http://elasticsearch:9200
        deploy:
            mode: replicated
            replicas: 2
#            placement:
#                constraints: [node.role == manager]
            restart_policy:
                condition: on-failure
            resources:
                limits:
                    cpus: "1"
        ports:
            - "5602:5601"
volumes:
    rabbitmq-log:
    rabbitmq-data:
    magento-cache:
    magento-session:
    magento-data:
    elasticsearch5-data:
networks:
    wd-ingress:
        external: true