version: '3'
services:
  storefront-api:
    build: .
    environment:
      VS_ENV: dev
    volumes:
      - './config:/project/config'
      - './ecosystem.json:/project/ecosystem.json'
      - './migrations:/project/migrations'
      - './package.json:/project/package.json'
      - './babel.config.js:/project/babel.config.js'
      - './tsconfig.json:/project/tsconfig.json'
      - './nodemon.json:/project/nodemon.json'
      - './scripts:/project/scripts'
      - './src:/project/src'
      - './var:/project/var'
      - './node_modules:/project/node_modules'
    tmpfs:
      - /project/dist
    depends_on:
      - elasticsearch
      - redis-api
    ports:
      - '8080:8080'
    networks:
        - outside-net
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:5.6.11
    environment:
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
      cluster.name: "docker-cluster"
      search.remote.connect: 'false'
      xpack.security.enabled: 'false'
      discovery.zen.minimum_master_nodes: 1
      discovery.type: 'single-node'
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch5-data:/usr/share/elasticsearch/data
    ports:
      - '9200:9200'
      - '9300:9300'
    networks:
      - outside-net
  kibana:
    image: docker.elastic.co/kibana/kibana:5.6.11
    environment:
      kibana.index: ".kibana6"
      elasticsearch.url: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    ports:
      - "5602:5601"
    networks:
      - outside-net
  redis-api:
    image: redis:alpine
    ports:
      - '6379:6379'
    networks:
      - outside-net
networks:
  outside-net:
    external:
      name: whitedonkey_default
volumes:
  elasticsearch5-data:
