version: '3'
services:
    magento2:
        image: qweyha520/magento2:latest
        environment:
            APPLICATION_ENV: development
        networks:
            - wd-ingress
        depends_on:
            - storefront
            - mysql
            - elasticsearch
        deploy:
            mode: replicated
            replicas: 1
            restart_policy:
                condition: none
            resources:
                limits:
                    cpus: "1"
                    memory: 1024M
                reservations:
                    cpus: '0.25'
                    memory: 1024M
        ports:
            - "8081:8081"
            - "8083:8083"
    nginx:
        image: qweyha520/nginx:latest
        networks:
            - wd-ingress
        deploy:
            mode: replicated
            replicas: 1
            restart_policy:
                condition: none
            resources:
                limits:
                    cpus: "1"
                    memory: 52M
        ports:
            - "80:80"
            - "443:443"
    mysql:
        image: percona
        networks:
            - wd-ingress
        ports:
            - "33061:3306"
        environment:
            - MYSQL_USER=${MYSQL_USER}
            - MYSQL_PASSWORD=${MYSQL_PASSWORD}
            - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
            - MYSQL_DATABASE=magento2
        volumes:
            - magento-data:/var/lib/mysql
        deploy:
            mode: replicated
            replicas: 1
            placement:
                constraints: [node.role == manager]
            restart_policy:
                condition: none
            resources:
                limits:
                    cpus: "1"
    storefront-api:
        image: qweyha520/storefront-api:latest
        networks:
            - wd-ingress
        environment:
            VS_ENV: production
            BIND_HOST: 0.0.0.0
            PM2_PUBLIC_KEY: ${PM2_PUBLIC_KEY}
            PM2_SECRET_KEY: ${PM2_SECRET_KEY}
        deploy:
            mode: replicated
            replicas: 1
            restart_policy:
                condition: none
            resources:
                limits:
                    cpus: "1"
        ports:
            - '8080:8080'
    storefront:
        image: qweyha520/storefront:latest
        networks:
            - wd-ingress
        environment:
            VS_ENV: production
            BIND_HOST: 0.0.0.0
            PM2_PUBLIC_KEY: ${PM2_PUBLIC_KEY}
            PM2_SECRET_KEY: ${PM2_SECRET_KEY}
        deploy:
            mode: replicated
            replicas: 1
            restart_policy:
                condition: none
            resources:
                limits:
                    cpus: "1"
        ports:
            - '3000:3000'
    rabbitmq:
        image: smebberson/alpine-rabbitmq
        networks:
            - wd-ingress
        ports:
            - "55672:15672"
            - "5672:5672"
        volumes:
            - rabbitmq-log:/data/rabbitmq/log
            - rabbitmq-data:/data/rabbitmq/mnesia
        deploy:
            mode: replicated
            replicas: 1
            restart_policy:
                condition: none
            resources:
                limits:
                    cpus: "1"
        environment:
            RABBITMQ_ENABLE_MANAGEMENT_PLUGIN: 'true'
            RABBITMQ_USER: ${RABBITMQ_USER}
            RABBITMQ_PASS: ${RABBITMQ_PASS}
    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:5.6.11
        networks:
            - wd-ingress
        environment:
            ES_JAVA_OPTS: '-Xms512m -Xmx512m'
            cluster.name: "docker-cluster"
            search.remote.connect: 'false'
            xpack.security.enabled: 'false'
            discovery.zen.minimum_master_nodes: 1
            discovery.type: 'single-node'
        volumes:
            - elasticsearch5-data:/usr/share/elasticsearch/data
        deploy:
            mode: replicated
            replicas: 1
            restart_policy:
                condition: none
            resources:
                limits:
                    cpus: "1"
        ports:
            - '9200:9200'
            - '9300:9300'
    kibana:
        image: docker.elastic.co/kibana/kibana:5.6.11
        networks:
            - wd-ingress
        environment:
            kibana.index: ".kibana6"
            elasticsearch.url: http://elasticsearch:9200
            elasticsearch.username: ${ELASTICSEARCH_USER}
            elasticsearch.password: ${ELASTICSEARCH_PASSWORD}
        deploy:
            mode: replicated
            replicas: 1
            restart_policy:
                condition: none
            resources:
                limits:
                    cpus: "1"
        ports:
            - "5602:5601"
    redis-session:
        image: redis:alpine
        networks:
            - wd-ingress
        deploy:
            mode: replicated
            replicas: 1
            restart_policy:
                condition: none
            resources:
                limits:
                    cpus: "1"
        volumes:
            - "magento-session:/data"
    redis-cache:
        image: redis:alpine
        networks:
            - wd-ingress
        deploy:
            mode: replicated
            replicas: 1
            restart_policy:
                condition: none
            resources:
                limits:
                    cpus: "1"
        volumes:
            - "magento-cache:/data"
    redis-api:
        image: redis:alpine
        networks:
            - wd-ingress
        deploy:
            mode: replicated
            replicas: 1
            restart_policy:
                condition: none
            resources:
                limits:
                    cpus: "1"
        ports:
            - '6379:6379'
volumes:
    rabbitmq-log:
    rabbitmq-data:
    magento-cache:
    magento-session:
    magento-data:
    elasticsearch5-data:
networks:
    wd-ingress:
        external: true
