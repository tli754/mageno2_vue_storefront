set $fastcgi_magento unix:/var/run/php-fpm.sock;
set $MAGE_ROOT /magento2;

root $MAGE_ROOT/pub;
index index.php;
autoindex off;
charset UTF-8;
error_page 404 403 = /errors/404.php;

include        fastcgi_params; ## See /etc/nginx/fastcgi_params
fastcgi_param  SCRIPT_FILENAME  /magento2/pub/index.php;
fastcgi_param  MAGE_RUN_TYPE store;
fastcgi_param  MAGE_ENVIRONMENT development;
fastcgi_param  MAGE_RUN_CODE default;

location / {
    #include      fastcgi_params; ## See /etc/nginx/fastcgi_params
    fastcgi_pass   $fastcgi_magento;
    #fastcgi_param  SCRIPT_FILENAME  /magento2/pub/index.php;
    #try_files $uri $uri/ /index.php$is_args$args;
}


location /media/customer/ {
    deny all;
}

location /media/downloadable/ {
    deny all;
}

location /media/import/ {
    deny all;
}

# PHP entry point for main application
location ~ (index|get|static|report|404|503|health_check)\.php$ {
    try_files $uri =404;
    fastcgi_pass   $fastcgi_magento;
    fastcgi_buffers 1024 4k;

    fastcgi_param  PHP_FLAG  "session.auto_start=off \n suhosin.session.cryptua=off";
    fastcgi_param  PHP_VALUE "memory_limit=2G \n max_execution_time=18000";
    fastcgi_read_timeout 600s;
    fastcgi_connect_timeout 600s;

    fastcgi_index  index.php;
    fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
    include        fastcgi_params;
}

gzip on;
gzip_disable "msie6";

gzip_comp_level 6;
gzip_min_length 1100;
gzip_buffers 16 8k;
gzip_proxied any;
gzip_types
text/plain
text/css
text/js
text/xml
text/javascript
application/javascript
application/x-javascript
application/json
application/xml
application/xml+rss
image/svg+xml;
gzip_vary on;

# Banned locations (only reached if the earlier PHP entry point regexes don't match)
location ~* (\.php$|\.htaccess$|\.git) {
    deny all;
}
